name: Lint PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions: {}

# PR updates can happen in quick succession leading to this
# workflow being trigger a number of times. This limits it
# to one run per PR.
concurrency:
  # Using github.ref is more robust across different event types
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5 # PR linting should be near-instant
    permissions:
      contents: read      # Required to read the config file
      pull-requests: read # Required to fetch the PR title
    steps:
      - name: Check PR Title
        uses: thehanimo/pr-title-checker@7fbfe05602bdd86f926d3fb3bccb6f3aed43bc70 # v1.4.3
        with:
          # Use the built-in github.token context
          GITHUB_TOKEN: ${{ github.token }}
          configuration_path: ".github/pr-title-checker-config.json"