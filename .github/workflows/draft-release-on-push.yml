name: Draft release on push to main

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'catalog/**'
  pull_request:
    types: [opened, reopened, synchronize]

# Prevent overlapping runs from corrupting the draft release
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Workflow-level minimal permissions
permissions:
  contents: read

jobs:
  autolabeler:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      # autolabeler needs issues: write to add labels
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter/autolabeler@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0

  update_release_draft:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      # write permission is required to create/update a GitHub release
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Drafts your next Release notes as Pull Requests are merged into "main"
      - uses: release-drafter/release-drafter@3a7fb5c85b80b1dda66e1ccb94009adbbd32fce3 # v7.0.0
        with:
          commitish: main
