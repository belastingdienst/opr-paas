name: Promote OLM catalog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote, without leading v"
        required: true
      target_phase:
        description: "Target OLM channel"
        required: true
        type: choice
        options:
          - fast
          - stable

concurrency:
  group: promote-catalog-${{ inputs.version }}-${{ inputs.target_phase }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote catalog to ${{ inputs.target_phase }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ inputs.version }}
      TARGET_PHASE: ${{ inputs.target_phase }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      BUNDLE_IMG: ghcr.io/belastingdienst/opr-paas-bundle:v${{ inputs.version }}
      CATALOG_IMG: ghcr.io/belastingdienst/opr-paas-catalog:latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: false

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install OPM
        run: make opm

      - name: Verify source bundle exists
        run: |
          podman login ghcr.io \
            -u "${GITHUB_ACTOR}" \
            -p "${{ secrets.GITHUB_TOKEN }}"
          podman pull "${BUNDLE_IMG}"

      - name: Resolve bundle metadata
        id: bundle_meta
        env:
          OPM_BIN: ${{ github.workspace }}/bin/opm
        run: |
          set -euo pipefail
          TMP_FILE="$(mktemp)"
          trap 'rm -f "$TMP_FILE"' EXIT

          "${OPM_BIN}" render "${BUNDLE_IMG}" -o yaml | yq eval 'select(.schema == "olm.bundle")' - > "$TMP_FILE"

          echo "package_name=$(yq -r '.package' "$TMP_FILE")" >> "$GITHUB_OUTPUT"
          echo "bundle_name=$(yq -r '.name' "$TMP_FILE")" >> "$GITHUB_OUTPUT"

      - name: Verify promotion prerequisites
        env:
          PACKAGE_NAME: ${{ steps.bundle_meta.outputs.package_name }}
          BUNDLE_NAME: ${{ steps.bundle_meta.outputs.bundle_name }}
        run: |
          set -euo pipefail

          REQUIRED_PREVIOUS_CHANNEL=""
          case "${TARGET_PHASE}" in
            fast)
              REQUIRED_PREVIOUS_CHANNEL="candidate"
              ;;
            stable)
              REQUIRED_PREVIOUS_CHANNEL="fast"
              ;;
          esac

          if [[ -z "${REQUIRED_PREVIOUS_CHANNEL}" ]]; then
            echo "No previous-channel prerequisite configured for ${TARGET_PHASE}"
            exit 0
          fi

          CHANNEL_FILE="catalog/${PACKAGE_NAME}/channels/${REQUIRED_PREVIOUS_CHANNEL}.yaml"
          if [[ ! -f "${CHANNEL_FILE}" ]]; then
            echo "Required previous channel file not found: ${CHANNEL_FILE}" >&2
            exit 1
          fi

          if ! BUNDLE_NAME="${BUNDLE_NAME}" yq -e '.entries[]? | select(.name == strenv(BUNDLE_NAME))' "${CHANNEL_FILE}" >/dev/null 2>&1; then
            echo "Cannot promote ${BUNDLE_NAME} to ${TARGET_PHASE}: it is not present in ${REQUIRED_PREVIOUS_CHANNEL}" >&2
            exit 1
          fi

      - name: Update catalog source
        run: |
          make catalog-update \
            BUNDLE_IMG="${BUNDLE_IMG}" \
            CATALOG_CHANNEL="${TARGET_PHASE}" \
            CATALOG_DEFAULT_CHANNEL=candidate

      - name: Create promotion PR
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(olm): promote opr-paas v${{ env.VERSION }} to ${{ env.TARGET_PHASE }}'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          signoff: true
          sign-commits: true
          branch: automation/olm-${{ env.TARGET_PHASE }}-v${{ env.VERSION }}
          delete-branch: true
          base: ${{ env.DEFAULT_BRANCH }}
          title: 'chore(olm): promote opr-paas v${{ env.VERSION }} to ${{ env.TARGET_PHASE }}'
          body: |
            Promotes `opr-paas` bundle `v${{ env.VERSION }}` to the `${{ env.TARGET_PHASE }}` OLM channel.

            This PR was created automatically by the promotion workflow.
          labels: |
            dependencies
