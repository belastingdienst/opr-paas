name: Build and release image + OLM and add to ghcr.io upon release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  version:
    name: Normalize version
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.export.outputs.version }}

    steps:
      - name: Determine version
        id: export
        run: |
          CLEANED="${GITHUB_REF_NAME#v}"
          echo "version=${CLEANED}" >> $GITHUB_OUTPUT

  operator_image:
    name: Push operator image to ghcr.io
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      packages: write
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: opr-paas-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            name=ghcr.io/belastingdienst/opr-paas,enable=true
          tags: |
            type=raw,value=v${{ env.VERSION }}
            type=raw,value=latest
            type=sha

      - name: Build and push operator image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: true
          platforms: 'linux/amd64,linux/arm64'
          tags: ${{ steps.opr-paas-meta.outputs.tags }}
          labels: ${{ steps.opr-paas-meta.outputs.labels }}
          build-args: VERSION=${{ env.VERSION }}

      - name: Generate opr-paas image SBOM
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: 'ghcr.io/belastingdienst/opr-paas:v${{ env.VERSION }}'
          scan-type: image
          format: 'github'
          output: 'opr-paas_image.sbom.json'
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          severity: 'MEDIUM,HIGH,CRITICAL'
          scanners: 'vuln'
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true

      - name: Add SBOM to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: '${{ github.workspace }}/opr-paas_image.sbom.json'

  bundle:
    name: Generate, validate, and publish OLM bundle
    runs-on: ubuntu-latest
    needs: [version, operator_image]
    permissions:
      contents: write     # Only needed for uploading assets in real releases
      packages: write     # Needed for pushing the bundle image
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.25"
          cache: false

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: GHCR login
        run: |
          podman login ghcr.io \
            -u "${GITHUB_ACTOR}" \
            -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Install Build Dependencies
        run: |
          make operator-sdk
          make kustomize

      - name: Generate OLM bundle
        run: |
          make bundle VERSION=${VERSION} \
            IMG=ghcr.io/belastingdienst/opr-paas:v${VERSION} \
            CHANNELS=candidate \
            DEFAULT_CHANNEL=candidate

      - name: Validate OLM bundle
        run: make bundle-validate

      - name: Build bundle image
        run: |
          make bundle-build VERSION=${VERSION} \
            CONTAINER_TOOL=podman \
            BUNDLE_IMG=ghcr.io/belastingdienst/opr-paas-bundle:v${VERSION}

      - name: Push bundle image
        run: |
          make bundle-push VERSION=${VERSION} \
            CONTAINER_TOOL=podman \
            BUNDLE_IMG=ghcr.io/belastingdienst/opr-paas-bundle:v${VERSION}

  catalog:
    name: Update catalog source and publish OLM catalog
    runs-on: ubuntu-latest
    needs: [version, bundle]
    permissions:
      packages: write
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      BUNDLE_IMG: ghcr.io/belastingdienst/opr-paas-bundle:v${{ needs.version.outputs.version }}
      CATALOG_IMG: ghcr.io/belastingdienst/opr-paas-catalog:latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.25"
          cache: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install OPM
        run: make opm

      - name: GHCR login
        run: |
          podman login ghcr.io \
            -u "${GITHUB_ACTOR}" \
            -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Verify source bundle exists
        run: |
          podman pull "${BUNDLE_IMG}"

      - name: Update catalog source
        run: |
          make catalog-update \
            BUNDLE_IMG="${BUNDLE_IMG}" \
            CATALOG_CHANNEL=candidate \
            CATALOG_DEFAULT_CHANNEL=candidate

      - name: Commit catalog source
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- catalog; then
            echo "No catalog source changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git add catalog
            git commit -m "chore(olm): add opr-paas v${VERSION} to candidate channel"
            git push origin HEAD:${DEFAULT_BRANCH}
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture catalog revision
        id: revision
        run: |
          echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build catalog image from source
        env:
          CATALOG_IMMUTABLE_IMG: ghcr.io/belastingdienst/opr-paas-catalog:git-${{ steps.revision.outputs.sha }}
        run: |
          make catalog-build \
            CATALOG_IMG="${CATALOG_IMMUTABLE_IMG}"

      - name: Push immutable catalog image
        env:
          CATALOG_IMMUTABLE_IMG: ghcr.io/belastingdienst/opr-paas-catalog:git-${{ steps.revision.outputs.sha }}
        run: |
          podman push "${CATALOG_IMMUTABLE_IMG}"

      - name: Push latest catalog tag
        env:
          CATALOG_IMMUTABLE_IMG: ghcr.io/belastingdienst/opr-paas-catalog:git-${{ steps.revision.outputs.sha }}
        run: |
          podman tag \
            "${CATALOG_IMMUTABLE_IMG}" \
            "${CATALOG_IMG}"
          podman push "${CATALOG_IMG}"
