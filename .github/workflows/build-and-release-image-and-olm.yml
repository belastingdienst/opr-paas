name: Build and release image + OLM and add to ghcr.io upon release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: belastingdienst
  OPERATOR_IMAGE: ghcr.io/belastingdienst/opr-paas
  BUNDLE_IMAGE: ghcr.io/belastingdienst/opr-paas-bundle
  CATALOG_IMAGE: ghcr.io/belastingdienst/opr-paas-catalog

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  version:
    name: Normalize version
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.export.outputs.version }}

    steps:
      - name: Determine version
        id: export
        run: |
          CLEANED="${GITHUB_REF_NAME#v}"
          echo "version=${CLEANED}" >> $GITHUB_OUTPUT

  operator_image:
    name: Push operator image to ghcr.io
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      packages: write
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: opr-paas-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            name=${{ env.OPERATOR_IMAGE }},enable=true
          tags: |
            type=raw,value=v${{ env.VERSION }}
            type=raw,value=latest
            type=sha

      - name: Build and push operator image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: 'linux/amd64,linux/arm64'
          tags: ${{ steps.opr-paas-meta.outputs.tags }}
          labels: ${{ steps.opr-paas-meta.outputs.labels }}
          build-args: VERSION=${{ env.VERSION }}

      - name: Generate opr-paas image SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: '${{ env.OPERATOR_IMAGE }}:v${{ env.VERSION }}'
          scan-type: image
          format: 'github'
          output: 'opr-paas_image.sbom.json'
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          severity: 'MEDIUM,HIGH,CRITICAL'
          scanners: 'vuln'
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true

      - name: Add SBOM to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: '${{ github.workspace }}/opr-paas_image.sbom.json'

  bundle:
    name: Generate, validate, and publish OLM bundle
    runs-on: ubuntu-latest
    needs: [version, operator_image]
    permissions:
      contents: write     # Only needed for uploading assets in real releases
      packages: write     # Needed for pushing the bundle image
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache: false

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: GHCR login
        run: |
          podman login "${REGISTRY}" \
            -u "${GITHUB_ACTOR}" \
            -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Install Build Dependencies
        run: |
          make operator-sdk
          make kustomize

      - name: Generate OLM bundle
        run: |
          make bundle VERSION=${VERSION} \
            IMG=${OPERATOR_IMAGE}:v${VERSION} \
            CHANNELS=candidate \
            DEFAULT_CHANNEL=candidate

      - name: Validate OLM bundle
        run: make bundle-validate

      - name: Build bundle image
        run: |
          make bundle-build VERSION=${VERSION} \
            CONTAINER_TOOL=podman \
            BUNDLE_IMG="${BUNDLE_IMAGE}:v${VERSION}"

      - name: Push bundle image
        run: |
          make bundle-push VERSION=${VERSION} \
            CONTAINER_TOOL=podman \
            BUNDLE_IMG="${BUNDLE_IMAGE}:v${VERSION}"

  catalog:
    name: Update catalog source and open OLM catalog PR
    runs-on: ubuntu-latest
    needs: [version, bundle]
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.BD_OPR_PAAS_GITHUB_APP_ID }}
          private-key: ${{ secrets.BD_OPR_PAAS_GITHUB_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"
          cache: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install OPM
        run: make opm

      - name: Verify source bundle exists
        run: |
          podman login "${REGISTRY}" \
            -u "${GITHUB_ACTOR}" \
            -p "${{ secrets.GITHUB_TOKEN }}"
          podman pull "${BUNDLE_IMAGE}:v${VERSION}"

      - name: Update catalog source
        run: |
          make catalog-update \
            BUNDLE_IMG="${BUNDLE_IMAGE}:v${VERSION}" \
            CATALOG_CHANNEL=candidate \
            CATALOG_DEFAULT_CHANNEL=candidate

      - name: Create catalog PR
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'chore(olm): add opr-paas v${{ env.VERSION }} to candidate channel'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          signoff: true
          sign-commits: true
          branch: automation/olm-candidate-v${{ env.VERSION }}
          delete-branch: true
          base: ${{ env.DEFAULT_BRANCH }}
          title: 'chore(olm): add opr-paas v${{ env.VERSION }} to candidate channel'
          body: |
            Adds `opr-paas` bundle `v${{ env.VERSION }}` to the `candidate` OLM channel.

            This PR was created automatically by the release workflow.
          labels: |
            dependencies
