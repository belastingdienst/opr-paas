name: Build and release image + OLM and add to ghcr.io upon release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: belastingdienst
  OPERATOR_IMAGE: ghcr.io/belastingdienst/opr-paas
  BUNDLE_IMAGE: ghcr.io/belastingdienst/opr-paas-bundle
  CATALOG_IMAGE: ghcr.io/belastingdienst/opr-paas-catalog

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  version:
    name: Normalize version
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.export.outputs.version }}

    steps:
      - name: Determine version
        id: export
        run: |
          CLEANED="${GITHUB_REF_NAME#v}"
          echo "version=${CLEANED}" >> $GITHUB_OUTPUT

  operator_image:
    name: Push operator image to ghcr.io
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      packages: write
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: opr-paas-meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            name=${{ env.OPERATOR_IMAGE }},enable=true
          tags: |
            type=raw,value=v${{ env.VERSION }}
            type=raw,value=latest
            type=sha

      - name: Build and push operator image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: 'linux/amd64,linux/arm64'
          tags: ${{ steps.opr-paas-meta.outputs.tags }}
          labels: ${{ steps.opr-paas-meta.outputs.labels }}
          build-args: VERSION=${{ env.VERSION }}

      - name: Generate opr-paas image SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: '${{ env.OPERATOR_IMAGE }}:v${{ env.VERSION }}'
          scan-type: image
          format: 'github'
          output: 'opr-paas_image.sbom.json'
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          severity: 'MEDIUM,HIGH,CRITICAL'
          scanners: 'vuln'
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true

      - name: Add SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: '${{ github.workspace }}/opr-paas_image.sbom.json'

  bundle:
    name: Generate, validate, and publish OLM bundle
    runs-on: ubuntu-latest
    needs: [version, operator_image]
    permissions:
      contents: write     # Only needed for uploading assets in real releases
      packages: write     # Needed for pushing the bundle image
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: false

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: GHCR login
        run: |
          podman login "${REGISTRY}" \
            -u "${GITHUB_ACTOR}" \
            -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Install Build Dependencies
        run: |
          make operator-sdk
          make kustomize

      - name: Generate OLM bundle
        run: |
          make bundle VERSION=${VERSION} \
            IMG=${OPERATOR_IMAGE}:v${VERSION} \
            CHANNELS=candidate \
            DEFAULT_CHANNEL=candidate

      - name: Validate OLM bundle
        run: make bundle-validate

      - name: Build bundle image
        run: |
          make bundle-build VERSION=${VERSION} \
            CONTAINER_TOOL=podman \
            BUNDLE_IMG="${BUNDLE_IMAGE}:v${VERSION}"

      - name: Push bundle image
        run: |
          make bundle-push VERSION=${VERSION} \
            CONTAINER_TOOL=podman \
            BUNDLE_IMG="${BUNDLE_IMAGE}:v${VERSION}"

  catalog:
    name: Update catalog source and publish OLM catalog
    runs-on: ubuntu-latest
    needs: [version, bundle]
    permissions:
      packages: write
      contents: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: "1.25"
          cache: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install OPM
        run: make opm

      - name: GHCR login
        run: |
          podman login "${REGISTRY}" \
            -u "${GITHUB_ACTOR}" \
            -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Verify source bundle exists
        run: |
          podman pull "${BUNDLE_IMAGE}:v${VERSION}"

      - name: Update catalog source
        run: |
          make catalog-update \
            BUNDLE_IMG="${BUNDLE_IMAGE}:v${VERSION}" \
            CATALOG_CHANNEL=candidate \
            CATALOG_DEFAULT_CHANNEL=candidate

      - name: Commit catalog source
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- catalog)" ]]; then
            echo "No catalog source changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git add catalog
            git commit -m "chore(olm): add opr-paas v${VERSION} to candidate channel"
            git push origin HEAD:${DEFAULT_BRANCH}
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture catalog revision
        id: revision
        run: |
          echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build catalog image from source
        env:
          CATALOG_IMMUTABLE_IMG: ${{ env.CATALOG_IMAGE }}:git-${{ steps.revision.outputs.sha }}
        run: |
          make catalog-build \
            CATALOG_IMG="${CATALOG_IMMUTABLE_IMG}"

      - name: Push immutable catalog image
        env:
          CATALOG_IMMUTABLE_IMG: ${{ env.CATALOG_IMAGE }}:git-${{ steps.revision.outputs.sha }}
        run: |
          podman push "${CATALOG_IMMUTABLE_IMG}"

      - name: Push latest catalog tag
        env:
          CATALOG_IMMUTABLE_IMG: ${{ env.CATALOG_IMAGE }}:git-${{ steps.revision.outputs.sha }}
        run: |
          podman tag \
            "${CATALOG_IMMUTABLE_IMG}" \
            "${CATALOG_IMAGE}:latest"
          podman push "${CATALOG_IMAGE}:latest"
