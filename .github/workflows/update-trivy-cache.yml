# Note: This workflow only updates the cache. You should create a separate workflow
# for your actual Trivy scans. In your scan workflow, set TRIVY_SKIP_DB_UPDATE=true
# and TRIVY_SKIP_JAVA_DB_UPDATE=true.
#
# src: https://github.com/marketplace/actions/aqua-security-trivy#cache
name: Update Trivy Cache

on:
  schedule:
    - cron: '23 0 * * *'  # Run daily at 23 past midnight UTC (23 chosen randomly)
  workflow_dispatch: # Allow manual triggering

# Set default permissions to none and only grant what is strictly needed
# Updating the cache requires the 'write' permission.
permissions:
  contents: read
  actions: write

jobs:
  update-trivy-db:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Prevent hanging processes
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Install ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1.2.4

      - name: Download and extract the vulnerability DB
        run: |
          mkdir -p "${{ github.workspace }}/.cache/trivy/db"
          oras pull ghcr.io/aquasecurity/trivy-db:2
          # Basic integrity check: ensure file is not empty
          [ -s db.tar.gz ] || exit 1
          tar -xzf db.tar.gz -C "${{ github.workspace }}/.cache/trivy/db"
          rm db.tar.gz

      - name: Download and extract the Java DB
        run: |
          mkdir -p "${{ github.workspace }}/.cache/trivy/java-db"
          oras pull ghcr.io/aquasecurity/trivy-java-db:1
          [ -s javadb.tar.gz ] || exit 1
          tar -xzf javadb.tar.gz -C "${{ github.workspace }}/.cache/trivy/java-db"
          rm javadb.tar.gz

      - name: Cache DBs
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ github.workspace }}/.cache/trivy
          # Added a 'v1' prefix to allow for easy cache busting if you change the logic
          key: v1-trivy-db-${{ steps.date.outputs.date }}